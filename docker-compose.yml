services:
  backend:
    build:
      context: ./antsbimbel-be
      dockerfile: Dockerfile
    container_name: antsbimbel-backend
    env_file:
      - ./antsbimbel-be/.env
    environment:
      SQLITE_PATH: /data/db.sqlite3
    volumes:
      - antsbimbel_db:/data
      - antsbimbel_media:/app/media
    ports:
      - "127.0.0.1:8000:8000"

  frontend:
    build:
      context: ./antsbimbel-fe
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: antsbimbel-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  antsbimbel_db:
  antsbimbel_media:
